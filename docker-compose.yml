services:

  # ── Application ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: final
    image: ghcr.io/jih-chang/buildownrag-api:latest
    container_name: buildownrag-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-buildownrag};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      Qdrant__Host: qdrant
      Qdrant__Port: "6334"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER:-BuildOwnRAG}"
      Jwt__Audience: "${JWT_AUDIENCE:-BuildOwnRAG}"
      Encryption__Key: "${ENCRYPTION_KEY}"
      Encryption__IV: "${ENCRYPTION_IV}"
      # Default: Aspire dashboard (dev diagnostics). With the observability profile,
      # set OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317 in .env.
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://aspire-dashboard:18889}"
      OTEL_SERVICE_NAME: "BuildOwnRAG.API"
      AllowedOrigins: "${ALLOWED_ORIGINS:-*}"
      LicenseServer__Url: "${LICENSE_SERVER_URL:-}"
      LicenseServer__Key: "${LICENSE_KEY:-}"
      # Optional dev convenience: set INIT_ADMIN_EMAIL + INIT_ADMIN_PASSWORD in .env to
      # auto-seed an admin on first boot and skip the wizard. Left empty by default so the
      # setup wizard owns admin creation and the credentials entered there take effect
      # (otherwise the app pre-seeds and the wizard's account would be ignored).
      INIT_COMPANY_NAME: "${INIT_COMPANY_NAME:-BuildOwnRAG Demo}"
      INIT_ADMIN_EMAIL: "${INIT_ADMIN_EMAIL:-}"
      INIT_ADMIN_PASSWORD: "${INIT_ADMIN_PASSWORD:-}"
      Llm__Provider: "${LLM_PROVIDER:-Gemini}"
      Llm__Model: "${LLM_MODEL:-gemini-2.0-flash}"
      Llm__ApiKey: "${LLM_API_KEY:-}"
      LLM__OllamaBaseUrl: "${LLM_OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      # How long Ollama keeps a model loaded after a request ("10m", "1h", "-1" = forever, "0" = unload now)
      LLM__OllamaKeepAlive: "${LLM_OLLAMA_KEEP_ALIVE:-10m}"
      OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-${LLM_API_KEY:-}}"
      GEMINI_CHAT_MODEL: "${GEMINI_CHAT_MODEL:-gemini-2.0-flash}"
      GEMINI_EMBEDDING_MODEL: "${GEMINI_EMBEDDING_MODEL:-text-embedding-004}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      aspire-dashboard:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend

  # ── First-run Setup Wizard (profile: setup) ──────────────────
  setup:
    build:
      context: .
      dockerfile: docker/setup/Dockerfile
    image: ghcr.io/jih-chang/buildownrag-setup:latest
    container_name: buildownrag-setup
    ports:
      - "${SETUP_PORT:-8081}:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8081
      IS_SETUP_COMPLETED: "${IS_SETUP_COMPLETED:-false}"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-buildownrag};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      Encryption__Key: "${ENCRYPTION_KEY}"
      Encryption__IV: "${ENCRYPTION_IV}"
    volumes:
      - ./.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - setup
    restart: "no"
    networks:
      - backend

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: buildownrag-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-buildownrag}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-buildownrag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  # ── Qdrant Vector DB ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: buildownrag-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ${DATA_DIR:-./data}/qdrant:/qdrant/storage
    restart: unless-stopped
    networks:
      - backend

  # ── Redis (AOF persistence) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: buildownrag-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    command: redis-server --appendonly yes --appendfsync everysec
    restart: unless-stopped
    networks:
      - backend

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: src/ManufacturingAI.Frontend
      dockerfile: ../../docker/frontend/Dockerfile
    image: ghcr.io/jih-chang/buildownrag-frontend:latest
    container_name: buildownrag-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: buildownrag-nginx
    profiles:
      - nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR:-./data}/nginx-certs:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ── Aspire Dashboard (OTel UI) ───────────────────────────────
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: buildownrag-aspire
    ports:
      - "${ASPIRE_UI_PORT:-18888}:18888"
      - "${ASPIRE_OTLP_PORT:-18889}:18889"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    restart: unless-stopped
    networks:
      - backend

  # ── Observability stack (profile: observability) ─────────────
  # Production monitoring: app -> OTLP -> collector -> Prometheus (metrics) + Loki (logs),
  # visualized in Grafana. Enable with:
  #   docker compose --profile observability up -d
  # and set OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317 in .env.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: buildownrag-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    profiles:
      - observability
    restart: unless-stopped
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: buildownrag-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    profiles:
      - observability
    restart: unless-stopped
    networks:
      - backend

  loki:
    image: grafana/loki:latest
    container_name: buildownrag-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./docker/observability/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    profiles:
      - observability
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: buildownrag-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    profiles:
      - observability
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge

# Named volumes (not DATA_DIR bind mounts) because these images run as non-root
# users; a fresh root-owned bind mount would fail their startup chown/write.
volumes:
  prometheus-data:
  loki-data:
  grafana-data:
