name: Docker Publish

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: buildownrag-api
            dockerfile: docker/api/Dockerfile
            context: .

          - image: buildownrag-setup
            dockerfile: docker/setup/Dockerfile
            context: .

          - image: buildownrag-frontend
            dockerfile: docker/frontend/Dockerfile
            context: src/ManufacturingAI.Frontend

          - image: buildownrag-connector-folder
            dockerfile: docker/connector-folder/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    name: Publish compose to Releases
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin compose to this release's image tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Default IMAGE_TAG to this version so the downloaded compose pulls it
          # (users can still override IMAGE_TAG in their .env).
          sed -i "s/:\${IMAGE_TAG:-latest}/:\${IMAGE_TAG:-${VERSION}}/g" deploy/docker-compose.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: deploy/README.md
          files: deploy/docker-compose.yml
