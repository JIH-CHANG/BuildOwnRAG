upstream api {
    server app:8080;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow health check over plain HTTP (used by Docker & load balancers)
    location /health {
        proxy_pass         http://api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
# Requires certificates mounted at /etc/nginx/ssl/
# Self-signed (dev): openssl req -x509 -nodes -days 365 -newkey rsa:2048
#   -keyout docker/nginx/ssl/server.key -out docker/nginx/ssl/server.crt
# Production: use Certbot / Let's Encrypt and mount certs via nginx_certs volume.
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API Proxy ────────────────────────────────────────────
    location / {
        proxy_pass             http://api;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade            $http_upgrade;
        proxy_set_header       Connection         "upgrade";
        proxy_set_header       Host               $host;
        proxy_set_header       X-Real-IP          $remote_addr;
        proxy_set_header       X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto  https;

        proxy_connect_timeout  75s;
        proxy_read_timeout     300s;   # allow long-running file downloads
        proxy_send_timeout     60s;

        proxy_buffer_size      16k;
        proxy_buffers          4 32k;
        proxy_busy_buffers_size 64k;
    }

    # Health check (no SSL required by callers)
    location /health {
        proxy_pass         http://api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        access_log off;
    }
}
